services:
  signaling:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  nginx_signaling:
    build:
      context: ./docker/nginx-signaling
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      SIGNALING_DOMAIN: ${SIGNALING_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-proxy-logs:/var/log/nginx
    depends_on:
      signaling:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  coturn:
    build:
      context: ./docker/coturn
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      TURN_PUBLIC_IP: ${TURN_PUBLIC_IP}
      TURN_REALM: ${TURN_REALM:-chat.local}
      SIGNALING_DOMAIN: ${SIGNALING_DOMAIN}
      TURN_USERNAME: ${TURN_USERNAME}
      TURN_PASSWORD: ${TURN_PASSWORD}
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - coturn-logs:/var/log
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[t]urnserver' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_DATABASE_URL: ${VITE_FIREBASE_DATABASE_URL}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
        VITE_SIGNALING_SERVER: ${VITE_SIGNALING_SERVER}
        VITE_TURN_HOST: ${VITE_TURN_HOST}
        VITE_TURN_PORT: ${VITE_TURN_PORT}
        VITE_TURNS_PORT: ${VITE_TURNS_PORT}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL}
        VITE_FORCE_TURN: ${VITE_FORCE_TURN:-true}
    ports:
      - "8080:80"
    depends_on:
      signaling:
        condition: service_healthy
      coturn:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  coturn-logs:
  nginx-proxy-logs:
